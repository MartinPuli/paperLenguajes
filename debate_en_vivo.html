<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Debate en vivo · ¿El ingeniero informático va a dejar de existir?</title>
<style>
  :root{--red:#e74c3c;--green:#22c39a;--bg:#0d1117;--bg2:#161b22;--ink:#e8edf2;--muted:#8b98a8;--line:#222b36}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:radial-gradient(1200px 700px at 50% -10%,#18222e 0%,var(--bg) 60%);color:var(--ink);
    font-family:"Segoe UI",system-ui,-apple-system,Helvetica,Arial,sans-serif;display:flex;flex-direction:column;height:100vh;overflow:hidden}
  header{display:flex;align-items:center;gap:16px;padding:13px 22px;border-bottom:1px solid var(--line);background:rgba(0,0,0,.25)}
  header .ttl{font-weight:700;letter-spacing:.5px;font-size:14px;color:var(--muted)}
  header .ttl b{color:var(--ink)}
  .contenders{display:flex;gap:10px;margin-left:auto;font-size:13px}
  .chip{display:flex;align-items:center;gap:7px;padding:5px 11px;border-radius:999px;border:1px solid var(--line);background:var(--bg2)}
  .timer{font-variant-numeric:tabular-nums;font-weight:700;padding:5px 12px;border-radius:999px;border:1px solid var(--line);background:var(--bg2);cursor:pointer}
  .timer.warn{color:#ffd54a;border-color:#6a5a1e} .timer.over{color:#ff6b5e;border-color:#7a2a24}
  .dot{width:9px;height:9px;border-radius:50%}.dot.r{background:var(--red)}.dot.g{background:var(--green)}
  /* barra-ataúd */
  #bar{position:relative;height:22px;background:var(--bg2);border-bottom:1px solid var(--line)}
  #fill{height:100%;width:0;background:linear-gradient(90deg,var(--red),var(--green));opacity:.22;transition:width .3s ease}
  #coffin{position:absolute;top:-3px;font-size:22px;transform:translateX(-50%);transition:left .3s ease;filter:drop-shadow(0 2px 4px rgba(0,0,0,.6))}
  main{flex:1;display:flex;align-items:center;justify-content:center;padding:30px;position:relative;cursor:pointer;transition:box-shadow .35s ease}
  main.side-r{box-shadow:inset 280px 0 220px -210px rgba(231,76,60,.55)}
  main.side-g{box-shadow:inset -280px 0 220px -210px rgba(34,195,154,.55)}
  .sec{position:absolute;top:16px;left:0;right:0;text-align:center;font-size:13px;letter-spacing:3px;text-transform:uppercase;color:var(--muted)}
  .card{max-width:1040px;width:100%;text-align:center;animation:in .35s ease}
  @keyframes in{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
  @keyframes pop{0%{opacity:0;transform:scale(.85)}60%{transform:scale(1.04)}100%{opacity:1;transform:scale(1)}}
  .who{display:inline-flex;align-items:center;gap:10px;font-weight:800;letter-spacing:1px;text-transform:uppercase;font-size:15px;padding:7px 16px;border-radius:999px;margin-bottom:22px}
  .who.r{color:#ffd9d2;background:rgba(231,76,60,.14);border:1px solid rgba(231,76,60,.4)}
  .who.g{color:#c9f6e8;background:rgba(34,195,154,.14);border:1px solid rgba(34,195,154,.4)}
  .dir{font-style:italic;color:var(--muted);font-size:18px;margin-bottom:13px}
  .line{font-size:37px;line-height:1.33;font-weight:500}.line.r{color:#ffeae6}.line.g{color:#e3fff6}.line b{color:#fff;font-weight:800}
  .title .kicker{font-size:16px;letter-spacing:4px;text-transform:uppercase;color:var(--muted);margin-bottom:14px}
  .title h1{font-size:52px;line-height:1.1;font-weight:800}
  .title .num{font-size:118px;font-weight:800;color:var(--line);line-height:.9;margin-bottom:6px}
  .aud .who{color:#ffe7b3;background:rgba(240,180,40,.12);border:1px solid rgba(240,180,40,.4)}
  .aud .line{font-size:30px;color:#ffeec9;font-style:italic}
  .climax .num{color:rgba(34,195,154,.25)}
  .badge{display:inline-block;font-size:13px;letter-spacing:2px;text-transform:uppercase;color:#0d1117;background:var(--green);padding:4px 12px;border-radius:999px;font-weight:800;margin-bottom:16px}
  /* portada */
  .cover h1{font-size:46px;line-height:1.15;font-weight:800;max-width:18ch;margin:0 auto 8px}
  .cover .vs{display:flex;gap:28px;align-items:center;justify-content:center;margin-top:34px;font-size:22px;font-weight:700}
  .cover .vs .v{color:var(--muted);font-weight:800;font-size:16px}
  .cover .p{padding:14px 22px;border-radius:14px;border:1px solid var(--line);background:var(--bg2)}
  .cover .p.r{box-shadow:inset 120px 0 90px -90px rgba(231,76,60,.6)} .cover .p.g{box-shadow:inset -120px 0 90px -90px rgba(34,195,154,.6)}
  .cover .p small{display:block;font-size:12px;letter-spacing:2px;text-transform:uppercase;margin-top:4px}
  .cover .p.r small{color:#ffb3a8}.cover .p.g small{color:#9ff0d8}
  .cover .go{margin-top:30px;color:var(--muted);font-size:15px}
  /* meme */
  .meme{animation:pop .4s cubic-bezier(.2,.8,.3,1.2)}
  .meme .tag{display:inline-block;font-size:12px;letter-spacing:3px;text-transform:uppercase;color:#0d1117;background:#ffd54a;padding:3px 12px;border-radius:999px;font-weight:800;margin-bottom:20px}
  .meme .mtop,.meme .mbot{font-family:Impact,"Arial Black","Haettenschweiler",sans-serif;font-weight:900;text-transform:uppercase;color:#fff;-webkit-text-stroke:2.2px #000;paint-order:stroke fill;font-size:42px;line-height:1.08;letter-spacing:.5px;text-shadow:3px 3px 0 rgba(0,0,0,.35)}
  .meme .memoji{font-size:135px;line-height:1.05;margin:14px 0;filter:drop-shadow(0 6px 14px rgba(0,0,0,.5))}
  footer{display:flex;align-items:center;gap:16px;padding:10px 22px;border-top:1px solid var(--line);background:rgba(0,0,0,.25);font-size:13px;color:var(--muted)}
  .nav{display:flex;gap:8px}
  button{font:inherit;color:var(--ink);background:var(--bg2);border:1px solid var(--line);border-radius:8px;padding:7px 13px;cursor:pointer}
  button:hover{border-color:#3a4757}
  #next{flex:1;text-align:center;font-size:12.5px;color:var(--muted);overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
  #next b{color:#c3ccd8}
  .count{font-variant-numeric:tabular-nums}
  kbd{background:var(--bg2);border:1px solid var(--line);border-bottom-width:2px;border-radius:5px;padding:1px 6px;font-family:inherit;font-size:12px}
  #toc{position:fixed;inset:0;background:rgba(5,8,12,.92);display:none;padding:40px;overflow:auto;z-index:9}
  #toc.open{display:block}
  #toc h2{font-size:14px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:20px;text-align:center}
  #toc .grid{max-width:560px;margin:0 auto;display:flex;flex-direction:column;gap:8px}
  #toc .item{display:flex;gap:12px;align-items:center;padding:12px 16px;border:1px solid var(--line);border-radius:10px;background:var(--bg2);cursor:pointer}
  #toc .item:hover{border-color:#3a4757}#toc .item .n{color:var(--muted);width:26px;font-weight:700}
  @media(max-width:680px){.line{font-size:24px}.title h1{font-size:30px}.title .num{font-size:70px}.cover h1{font-size:30px}.meme .mtop,.meme .mbot{font-size:28px}.meme .memoji{font-size:90px}.contenders{display:none}#next{display:none}}
</style>
</head>
<body>
<header>
  <div class="ttl"><b>DEBATE EN VIVO</b> · ¿El ingeniero informático va a dejar de existir o va a cambiar de rol?</div>
  <div class="contenders">
    <span class="chip"><span class="dot r"></span> Martín · <b style="color:#ffd9d2">EXTINCIÓN</b></span>
    <span class="chip"><span class="dot g"></span> Nico · <b style="color:#c9f6e8">CAMBIO</b></span>
  </div>
  <div class="timer" id="timer" title="Click para iniciar / pausar el cronómetro">12:00</div>
</header>
<div id="bar"><div id="fill"></div><div id="coffin">⚰️</div></div>

<main id="stage"><div class="sec" id="secName"></div><div id="card" class="card"></div></main>

<footer>
  <div class="nav">
    <button onclick="go(-1)">‹</button><button onclick="go(1)">›</button><button onclick="toggleToc()">☰ Índice</button>
  </div>
  <div id="next"></div>
  <div class="count" id="count"></div>
</footer>

<div id="toc"><h2>Índice del debate · click para saltar</h2><div class="grid" id="tocGrid"></div></div>

<script>
const M="Martín · EXTINCIÓN", N="Nico · CAMBIO";
const B=[
 {kind:'cover'},

 {kind:'title', sec:'Cold open', num:'0', kicker:'El funeral'},
 {kind:'r', sec:'Cold open', dir:'entra serio, tono de velorio', t:"Señoras, señores… hoy despedimos al <b>ingeniero informático</b>. Murió haciendo lo que amaba: ser reemplazado por un autocomplete. Lo mató la inteligencia artificial. Un aplauso para el finado. <i>(cierra un cajón imaginario)</i>"},
 {kind:'g', sec:'Cold open', dir:'lo frena', t:"Pará, pará. Bajá el cajón. El muerto está <b>acá sentado</b> y goza de buena salud."},
 {kind:'g', sec:'Cold open', t:"¿El ingeniero <b>desaparece</b> o <b>cambia</b>? Martín defiende el funeral. Yo: <b>no lo reemplaza la IA, su rol se transforma</b>. Y te aviso, Martín: <b>hay un papel de 1936</b> que te va a arruinar el final. Guardátelo."},
 {kind:'aud', sec:'Cold open', t:"Levanten la mano: ¿quién cree que en diez años no van a existir más los programadores?"},

 {kind:'title', sec:'Choque 1', num:'1', kicker:'La velocidad del avance'},
 {kind:'r', sec:'Choque 1', t:"El dato que te va a doler. Hace dos años la IA resolvía <b>1 de cada 7</b> problemas reales. ¿Hoy? <b>Más de 9 de cada 10.</b> Eso es un cohete 🚀. Y arriba no hay lugar para vos."},
 {kind:'g', sec:'Choque 1', dir:'tranquilo', t:"Te concedo el cohete. Pero ese examen… ¿quién lo escribió? Mide resolver problemas <b>ya planteados</b>. Tu IA se sabe todas las respuestas del final… pero no se entera de que el cliente, en realidad, <b>quería otra cosa</b>. Lo difícil es entender qué pidió el cliente. Alguien tiene que <b>hacer las preguntas</b>."},
 {kind:'r', sec:'Choque 1', dir:'no cede, presiona', t:"Detalle. Al cliente también lo va a entrevistar la IA. Seguís sin ver la curva: <b>no para</b>."},
 {kind:'aud', sec:'Choque 1', t:"Ojo: por ahora va ganando Martín. Aguanten."},

 {kind:'title', sec:'Choque 2', num:'2', kicker:'"Hasta los dueños lo dicen" · rápido'},
 {kind:'r', sec:'Choque 2', t:"No es opinión mía. Google y Microsoft: la IA ya escribe <b>un tercio</b> de su código. El CEO de Anthropic predijo <b>el 90 %</b>. ¡Lo dicen los que la fabrican!"},
 {kind:'g', sec:'Choque 2', t:"Ajá. ¿Y sabés cómo <b>termina</b> esa frase del 90 %?"},
 {kind:'r', sec:'Choque 2', t:"…¿cómo termina?"},
 {kind:'g', sec:'Choque 2', t:"«…pero el programador todavía tiene que especificar el diseño». El más optimista del <b>planeta</b> deja al humano decidiendo. Gracias por la cita, Martín. <b>Me la dejaste servida.</b>"},
 {kind:'meme', sec:'Choque 2', top:'Cité a tu propio testigo', emoji:'🫵😎', bottom:'Gracias, rey'},

 {kind:'title', sec:'Choque 3', num:'3', kicker:'"Te hace ir más rápido" · rápido'},
 {kind:'r', sec:'Choque 3', t:"Con IA, una tarea <b>56 % más rápido</b>. Sobran la mitad. Es una calculadora."},
 {kind:'g', sec:'Choque 3', t:"Otro estudio: expertos, en proyectos reales, con IA <b>19 % más LENTOS</b>. No miente ninguno: miden cosas distintas. El tuyo, una tarea de juguete."},
 {kind:'r', sec:'Choque 3', dir:'aguanta', t:"Un estudio. Contra la curva entera."},
 {kind:'g', sec:'Choque 3', dir:'dejá el remate respirar', t:"Y lo mejor: <b>estaban convencidos de que iban más rápido</b>… y eran un <b>19 % más lentos</b>. Es el <b>Dunning-Kruger con commit</b>."},
 {kind:'meme', sec:'Choque 3', top:'Devs con IA: «voy 5 minutos»', emoji:'⏳', bottom:'3 horas después: sigue debuggeando'},
 {kind:'aud', sec:'Choque 3', t:"Creían que volaban. Iban para atrás."},

 {kind:'title', sec:'Choque 4', num:'4', kicker:'Calidad y seguridad'},
 {kind:'g', sec:'Choque 4', dir:'ahora ataca él', t:"Ataco yo. El «problema del 70 %»: la IA te hace rápido el 70 %; el 30 % que falta necesita a alguien que <b>sepa</b>. Y su código viene con agujeros de seguridad <b>4 de cada 10 veces</b>. La IA hace code review como yo hago dieta: <b>aprueba todo</b>… y después lloramos."},
 {kind:'meme', sec:'Choque 4', top:'El 40 % del código tiene vulnerabilidades', emoji:'🔥🐶☕🔥', bottom:'This is fine'},
 {kind:'r', sec:'Choque 4', dir:'confiado, se encoge de hombros', t:"Bah… eso se arregla con mejores modelos. Cuestión de tiempo."},
 {kind:'g', sec:'Choque 4', dir:'media sonrisa', t:"…Ahí. Ahí quería que cayeras."},
 {kind:'meme', sec:'Choque 4', top:'Dijiste «ya lo van a mejorar»', emoji:'🃏', bottom:'Activaste mi carta trampa'},
 {kind:'g', sec:'Choque 4', dir:'guiña al público', t:"Y eso que esto <b>todavía no es el papel de 1936</b>…"},
 {kind:'r', sec:'Choque 4', dir:'baja la guardia un segundo', t:"…Che. ¿Y si tenés razón, y el que sobra <b>soy yo</b>?"},

 {kind:'title', sec:'Choque 5', num:'5', kicker:'La matemática · CLÍMAX (lento y en serio)', climax:true, badge:'🎯 el papel de 1936'},
 {kind:'g', sec:'Choque 5', climax:true, t:"¿Te acordás del papel de 1936? Llegó. Hay cosas que <b>no se arreglan nunca</b>. No porque falte tecnología: porque son <b>imposibles</b>. Probadas. Con matemática. Antes de la primera computadora."},
 {kind:'g', sec:'Choque 5', climax:true, dir:'Uno', t:"Turing prueba el <b>problema de la detención</b>. Y su corolario, el <b>teorema de Rice</b>, remata: verificar <b>en general</b> si un programa cumple su especificación es <b>indecidible</b>. La máquina escribe código, pero no puede garantizar que esté bien."},
 {kind:'meme', sec:'Choque 5', top:'Turing, 1936, sin computadora ni café', emoji:'🗿', bottom:'Ya te había arruinado el negocio'},
 {kind:'g', sec:'Choque 5', climax:true, dir:'Dos', t:"Y las IA «alucinan»: está <b>demostrado que es inevitable</b>. Es ese compañero de grupo que entrega <b>re seguro</b>… y está todo mal. No puede revisarse sola: necesita a alguien de <b>afuera</b>. Sos vos."},
 {kind:'g', sec:'Choque 5', climax:true, dir:'Tres — y esto es esta materia', t:"El código es un idioma <b>exacto</b>; lo que pedís en español es <b>ambiguo</b>. El ingeniero es el <b>traductor</b> entre lo que el humano quiso decir y lo que la máquina entiende."},
 {kind:'g', sec:'Choque 5', climax:true, dir:'te adelanto tu pregunta', t:"«¿Y el humano sí garantiza?» No: tampoco. Pero el humano <b>pone la firma</b>. A una IA no la podés hacer responsable, no la podés <b>meter presa</b>, no le hacés juicio. Alguien tiene que poner la cara."},
 {kind:'meme', sec:'Choque 5', top:'Virgin «esperá la próxima versión»', emoji:'🧍  vs  🗿', bottom:'Chad «tengo un teorema de 1936»'},
 {kind:'r', sec:'Choque 5', dir:'traga', t:"…Contra un teorema no puedo discutir. Te lo concedo."},
 {kind:'aud', sec:'Choque 5', t:"Acá se inclinó la cancha. Esto ninguna versión lo arregla."},

 {kind:'title', sec:'Choque 6', num:'6', kicker:'"Ya están echando gente"'},
 {kind:'r', sec:'Choque 6', dir:'última carta, pega fuerte', t:"La teoría no paga el alquiler. El empleo de programadores jóvenes (22-25) cayó <b>casi 20 % desde 2024</b>. El desempleo de los recién recibidos de Computación es <b>peor que el de Historia del Arte</b>. ¿De dónde salen los arquitectos?"},
 {kind:'g', sec:'Choque 6', dir:'lo reconoce y reencuadra', t:"Tu mejor golpe, te lo reconozco. Pero «programador» cae 6 %, y <b>«desarrollador de software» crece 15 %</b>. Y escuchá esto: pusieron los cajeros automáticos para <b>echar bancarios</b>… y hoy hay <b>más bancarios que nunca</b>. La automatización no echa: te <b>muda de oficina</b>."},
 {kind:'r', sec:'Choque 6', t:"…O sea que me das la mitad de la razón."},
 {kind:'g', sec:'Choque 6', t:"Te la doy, sin venderte color: la base se desploma, la cima se concentra. La profesión no se muere — <b>se polariza</b>. Pero polarizarse <b>no es extinguirse</b>."},

 {kind:'title', sec:'Cierre', num:'★', kicker:'Síntesis — los dos en el medio'},
 {kind:'r', sec:'Cierre', dir:'honesto', t:"Te concedo lo principal. El ingeniero que <b>solo</b> teclea código… ese sí se extingue. Muere la <b>tarea</b>, no la <b>profesión</b>. <i>(mira el cajón)</i> …Capaz que no necesitábamos el cajón."},
 {kind:'meme', sec:'Cierre', top:'Escribir código línea por línea ❌', emoji:'🙅‍♂️ ➜ 🙆‍♂️', bottom:'Decidir qué construir y responsabilizarse ✅'},
 {kind:'g', sec:'Cierre', t:"No es ascenso gratis ni para todos: la profesión sube, pero el de abajo la pasa mal. <b>De obrero a arquitecto.</b> Lo respalda la historia, lo matiza la evidencia y lo demuestra la teoría."},
 {kind:'r', sec:'Cierre', dir:'remate, al público', t:"Como dijo Grady Booch: «tus herramientas cambian… pero tus problemas no»."},
 {kind:'g', sec:'Cierre', dir:'al público', t:"Y la paradoja: <b>cuanto más poderosa la máquina, más vale el humano que decide qué hacer con ella.</b> No se esfuercen <b>más</b>: esfuércense <b>inteligentemente — y dónde</b>. La pelea no es contra la máquina: es por el <b>lugar</b> desde el cual se la maneja."},
 {kind:'meme', sec:'Cierre', top:'El ingeniero en 2036', emoji:'🧠👑', bottom:'No desapareció. Subió de nivel.'},
 {kind:'g', sec:'Cierre', dir:'a Martín, palmada', t:"Tranquilo, Martín: no se extingue el ingeniero. Se extingue el que creía que su laburo era teclear. Igual vos nunca tecleabas: <b>copiabas de Stack Overflow</b>."},
 {kind:'r', sec:'Cierre', dir:'último gag', t:"…Touché. Guarden el cajón. Por las dudas, pero guárdenlo. <b>Gracias.</b>"},
];

const card=document.getElementById('card'), secName=document.getElementById('secName'),
      count=document.getElementById('count'), fill=document.getElementById('fill'),
      stage=document.getElementById('stage'), coffin=document.getElementById('coffin'),
      nextEl=document.getElementById('next');
let i=0;
const whoName=k=> k==='r'?M : k==='g'?N : '';
const br=s=>(s||'').replace(/\\n/g,'<br>');
const strip=h=>(h||'').replace(/<[^>]+>/g,'');

function render(){
  const b=B[i]; let h='', cls='card';
  if(b.kind==='cover'){
    cls='card cover';
    h=`<div class="kicker" style="letter-spacing:5px;color:#8b98a8;margin-bottom:18px">DEBATE EN VIVO</div>
       <h1>¿El ingeniero informático va a dejar de existir o va a cambiar de rol?</h1>
       <div class="vs"><div class="p r">🔴 Martín<small>Extinción</small></div><div class="v">VS</div><div class="p g">🟢 Nico<small>Cambio</small></div></div>
       <div class="go">Lenguajes Formales y Teoría de la Computación · UCEMA &nbsp;·&nbsp; <kbd>→</kbd> o click para empezar</div>`;
  } else if(b.kind==='title'){
    cls='card title'+(b.climax?' climax':'');
    h=`<div class="num">${b.num}</div>`+(b.badge?`<div class="badge">${b.badge}</div>`:'')+`<div class="kicker">${b.sec}</div><h1>${b.kicker}</h1>`;
  } else if(b.kind==='meme'){
    cls='card meme';
    h=`<div class="tag">😂 meme</div><div class="mtop">${br(b.top)}</div><div class="memoji">${b.emoji}</div><div class="mbot">${br(b.bottom)}</div>`;
  } else {
    const aud=b.kind==='aud';
    cls='card'+(aud?' aud':'')+(b.climax?' climax':'');
    const wc=b.kind==='r'?'r':b.kind==='g'?'g':'';
    const dot=b.kind==='r'?'<span class="dot r"></span>':b.kind==='g'?'<span class="dot g"></span>':'';
    h=`<div class="who ${wc}">${dot}${aud?'🔊 Al público':whoName(b.kind)}</div>`+(b.dir?`<div class="dir">(${b.dir})</div>`:'')+`<div class="line ${wc}">${b.t}</div>`;
  }
  card.className=cls; card.innerHTML=h;
  stage.className = b.kind==='r'?'side-r':b.kind==='g'?'side-g':'';
  secName.textContent=(b.kind==='title'||b.kind==='cover')?'':b.sec;
  count.textContent=`${i+1} / ${B.length}`;
  const pct=i/(B.length-1)*100;
  fill.style.width=pct+'%'; coffin.style.left=pct+'%';
  coffin.textContent = i===B.length-1 ? '🧠👑' : i===0 ? '⚰️' : '⚰️';
  // modo presentador: próxima línea
  const nx=B[i+1];
  if(nx){ const who = nx.kind==='r'?'🔴 Martín':nx.kind==='g'?'🟢 Nico':nx.kind==='meme'?'😂 MEME':nx.kind==='aud'?'🔊 Público':nx.kind==='title'?'▸ '+(nx.kicker||''):'▸';
    const snip = nx.kind==='meme'?strip(nx.top): nx.kind==='title'||nx.kind==='cover'?'': strip(nx.t).slice(0,60)+'…';
    nextEl.innerHTML = `sigue → <b>${who}</b> ${snip?'· '+snip:''}`; }
  else nextEl.textContent='— fin —';
}
function go(d){ i=Math.max(0,Math.min(B.length-1,i+d)); render(); }

/* cronómetro 12:00 */
let secs=12*60, tHandle=null, running=false;
const tEl=document.getElementById('timer');
function fmt(s){const m=Math.floor(Math.abs(s)/60),x=Math.abs(s)%60;return (s<0?'-':'')+m+':'+String(x).padStart(2,'0');}
function tick(){ secs--; tEl.textContent=fmt(secs);
  tEl.classList.toggle('warn', secs<=120 && secs>0); tEl.classList.toggle('over', secs<=0); }
function toggleTimer(){ if(running){clearInterval(tHandle);running=false;} else {tHandle=setInterval(tick,1000);running=true;} }
tEl.onclick=toggleTimer;

stage.addEventListener('click',()=>{ if(!running && i===0) toggleTimer(); go(1); });
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key===' '||e.key==='PageDown'){e.preventDefault(); if(!running&&i===0)toggleTimer(); go(1);}
  else if(e.key==='ArrowLeft'||e.key==='PageUp'){e.preventDefault();go(-1);}
  else if(e.key==='Home'){i=0;render();}
  else if(e.key==='End'){i=B.length-1;render();}
  else if(e.key.toLowerCase()==='f'){ if(!document.fullscreenElement)document.documentElement.requestFullscreen(); else document.exitFullscreen(); }
  else if(e.key.toLowerCase()==='t'){toggleTimer();}
  else if(e.key.toLowerCase()==='r'){clearInterval(tHandle);running=false;secs=12*60;tEl.textContent=fmt(secs);tEl.classList.remove('warn','over');}
  else if(e.key.toLowerCase()==='m'){toggleToc();}
  else if(e.key==='Escape'){toc.classList.remove('open');}
});
const toc=document.getElementById('toc'), grid=document.getElementById('tocGrid');
B.forEach((b,idx)=>{ if(b.kind==='title'){ const d=document.createElement('div'); d.className='item';
  d.innerHTML=`<span class="n">${b.num}</span><span><b>${b.sec}</b> — ${b.kicker}</span>`;
  d.onclick=()=>{ i=idx; render(); toggleToc(); }; grid.appendChild(d);} });
function toggleToc(){ toc.classList.toggle('open'); }
toc.addEventListener('click',e=>{ if(e.target===toc) toc.classList.remove('open'); });
render();
</script>
</body>
</html>
